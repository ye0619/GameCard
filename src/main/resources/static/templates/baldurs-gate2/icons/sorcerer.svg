<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Dragon eye -->
  <ellipse cx="24" cy="24" rx="16" ry="14" fill="#C71585" stroke="#8B0A50" stroke-width="2"/>
  <!-- Inner eye -->
  <ellipse cx="24" cy="24" rx="10" ry="8" fill="#DB5DA6" stroke="#8B0A50" stroke-width="1"/>
  <!-- Pupil (slit) -->
  <ellipse cx="24" cy="24" rx="4" ry="10" fill="#8B0A50"/>
  <!-- Eye glow -->
  <ellipse cx="24" cy="24" rx="2" ry="6" fill="#FF69B4" fill-opacity="0.6"/>
  <!-- Dragon scale accents -->
  <path d="M10 12 Q12 8 16 10" fill="none" stroke="#C71585" stroke-width="1" stroke-opacity="0.5"/>
  <path d="M32 10 Q36 8 38 12" fill="none" stroke="#C71585" stroke-width="1" stroke-opacity="0.5"/>
  <path d="M8 30 Q6 34 10 36" fill="none" stroke="#C71585" stroke-width="1" stroke-opacity="0.5"/>
  <path d="M40 30 Q42 34 38 36" fill="none" stroke="#C71585" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Magic sparks -->
  <circle cx="8" cy="8" r="1.5" fill="#DB5DA6" fill-opacity="0.6"/>
  <circle cx="40" cy="10" r="1" fill="#DB5DA6" fill-opacity="0.5"/>
  <circle cx="6" cy="38" r="1.5" fill="#DB5DA6" fill-opacity="0.5"/>
  <circle cx="42" cy="38" r="1" fill="#DB5DA6" fill-opacity="0.4"/>
  <circle cx="24" cy="6" r="1.5" fill="#DB5DA6" fill-opacity="0.4"/>
</svg>
