<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Lute body -->
  <ellipse cx="28" cy="32" rx="12" ry="10" fill="#8B008B" stroke="#5B005B" stroke-width="1.5"/>
  <!-- Sound hole -->
  <circle cx="28" cy="32" r="4" fill="#5B005B"/>
  <!-- Neck -->
  <rect x="22" y="6" width="4" height="20" rx="1" fill="#8B008B" stroke="#5B005B" stroke-width="1"/>
  <!-- Headstock -->
  <rect x="21" y="4" width="6" height="6" rx="2" fill="#AB30AB" stroke="#5B005B" stroke-width="0.8"/>
  <!-- Strings -->
  <line x1="23" y1="12" x2="23" y2="38" stroke="#D8BFD8" stroke-width="0.5" stroke-opacity="0.6"/>
  <line x1="25" y1="12" x2="26" y2="38" stroke="#D8BFD8" stroke-width="0.5" stroke-opacity="0.6"/>
  <!-- Music notes -->
  <circle cx="8" cy="18" r="2.5" fill="#AB30AB" fill-opacity="0.5"/>
  <line x1="10.5" y1="18" x2="10.5" y2="10" stroke="#AB30AB" stroke-width="1" stroke-opacity="0.5"/>
  <path d="M10.5 10 Q14 11 13 14" fill="none" stroke="#AB30AB" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="40" cy="14" r="2" fill="#AB30AB" fill-opacity="0.4"/>
  <line x1="42" y1="14" x2="42" y2="8" stroke="#AB30AB" stroke-width="0.8" stroke-opacity="0.4"/>
</svg>
