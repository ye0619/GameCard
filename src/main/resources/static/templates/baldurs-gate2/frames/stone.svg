<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 520">
  <defs>
    <linearGradient id="stoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5A4A36"/>
      <stop offset="50%" stop-color="#3A2A1B"/>
      <stop offset="100%" stop-color="#2A1A0B"/>
    </linearGradient>
  </defs>
  <!-- Outer stone border - darker -->
  <rect x="2" y="2" width="376" height="516" rx="6" fill="none" stroke="#2A1A0B" stroke-width="8"/>
  <!-- Stone block pattern frame -->
  <rect x="4" y="4" width="372" height="512" rx="5" fill="none" stroke="url(#stoneGrad)" stroke-width="4"/>
  <!-- Individual stone blocks along top -->
  <line x1="2" y1="30" x2="6" y2="30" stroke="#1A0A00" stroke-width="1"/>
  <line x1="2" y1="60" x2="6" y2="60" stroke="#1A0A00" stroke-width="1"/>
  <line x1="2" y1="90" x2="6" y2="90" stroke="#1A0A00" stroke-width="1"/>
  <line x1="2" y1="120" x2="6" y2="120" stroke="#1A0A00" stroke-width="1"/>
  <line x1="2" y1="150" x2="6" y2="150" stroke="#1A0A00" stroke-width="1"/>
  <!-- Along bottom -->
  <line x1="2" y1="400" x2="6" y2="400" stroke="#1A0A00" stroke-width="1"/>
  <line x1="2" y1="430" x2="6" y2="430" stroke="#1A0A00" stroke-width="1"/>
  <line x1="2" y1="460" x2="6" y2="460" stroke="#1A0A00" stroke-width="1"/>
  <line x1="2" y1="490" x2="6" y2="490" stroke="#1A0A00" stroke-width="1"/>
  <!-- Along right side -->
  <line x1="374" y1="30" x2="378" y2="30" stroke="#1A0A00" stroke-width="1"/>
  <line x1="374" y1="60" x2="378" y2="60" stroke="#1A0A00" stroke-width="1"/>
  <line x1="374" y1="90" x2="378" y2="90" stroke="#1A0A00" stroke-width="1"/>
  <line x1="374" y1="120" x2="378" y2="120" stroke="#1A0A00" stroke-width="1"/>
  <line x1="374" y1="150" x2="378" y2="150" stroke="#1A0A00" stroke-width="1"/>
  <line x1="374" y1="400" x2="378" y2="400" stroke="#1A0A00" stroke-width="1"/>
  <line x1="374" y1="430" x2="378" y2="430" stroke="#1A0A00" stroke-width="1"/>
  <line x1="374" y1="460" x2="378" y2="460" stroke="#1A0A00" stroke-width="1"/>
  <line x1="374" y1="490" x2="378" y2="490" stroke="#1A0A00" stroke-width="1"/>
  <!-- Corner decorative notches -->
  <path d="M6 6 L16 6 L16 16" fill="none" stroke="#5A4A36" stroke-width="1.5" stroke-opacity="0.6"/>
  <path d="M374 6 L364 6 L364 16" fill="none" stroke="#5A4A36" stroke-width="1.5" stroke-opacity="0.6"/>
  <path d="M6 514 L16 514 L16 504" fill="none" stroke="#5A4A36" stroke-width="1.5" stroke-opacity="0.6"/>
  <path d="M374 514 L364 514 L364 504" fill="none" stroke="#5A4A36" stroke-width="1.5" stroke-opacity="0.6"/>
</svg>
