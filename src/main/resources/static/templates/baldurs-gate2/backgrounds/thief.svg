<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#4A4A4A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2F2F2F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="50%" stop-color="#121212"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="stone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A2A2A" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#1A1A1A" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="600" height="900" fill="url(#bg)"/>
  <rect width="600" height="900" fill="url(#stone)"/>
  <circle cx="300" cy="350" r="300" fill="url(#glow)"/>
  <!-- Shadow cloak pattern -->
  <path d="M0,0 Q300,80 600,0 L600,100 Q300,180 0,100Z" fill="#4A4A4A" fill-opacity="0.08"/>
  <path d="M0,800 Q300,720 600,800 L600,900 L0,900Z" fill="#4A4A4A" fill-opacity="0.06"/>
  <!-- Dagger stroke patterns -->
  <path d="M180,250 L250,350" stroke="#4A4A4A" stroke-width="2" stroke-opacity="0.12"/>
  <path d="M420,250 L350,350" stroke="#4A4A4A" stroke-width="2" stroke-opacity="0.12"/>
  <path d="M300,200 L300,300" stroke="#4A4A4A" stroke-width="1" stroke-opacity="0.1"/>
  <!-- Smoke-like curves -->
  <path d="M100,600 Q200,500 150,400" fill="none" stroke="#4A4A4A" stroke-width="2" stroke-opacity="0.06"/>
  <path d="M500,650 Q400,550 450,450" fill="none" stroke="#4A4A4A" stroke-width="2" stroke-opacity="0.06"/>
  <path d="M250,700 Q300,650 350,700" fill="none" stroke="#4A4A4A" stroke-width="1" stroke-opacity="0.08"/>
  <!-- Stone dots -->
  <circle cx="120" cy="200" r="3" fill="#2A2A2A" fill-opacity="0.2"/>
  <circle cx="490" cy="180" r="4" fill="#2A2A2A" fill-opacity="0.15"/>
  <circle cx="440" cy="800" r="3" fill="#2A2A2A" fill-opacity="0.2"/>
  <circle cx="160" cy="750" r="4" fill="#2A2A2A" fill-opacity="0.12"/>
</svg>
