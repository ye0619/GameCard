<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#9AC0CD" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7A9BAE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E2226"/>
      <stop offset="50%" stop-color="#14181C"/>
      <stop offset="100%" stop-color="#0A0E12"/>
    </linearGradient>
    <linearGradient id="stone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A3238" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#1E2226" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0E1218" stop-opacity="0.25"/>
    </linearGradient>
  </defs>
  <rect width="600" height="900" fill="url(#bg)"/>
  <rect width="600" height="900" fill="url(#stone)"/>
  <circle cx="300" cy="350" r="300" fill="url(#glow)"/>
  <!-- Silver steel accents -->
  <path d="M0,0 Q300,80 600,0 L600,100 Q300,180 0,100Z" fill="#9AC0CD" fill-opacity="0.08"/>
  <path d="M0,800 Q300,720 600,800 L600,900 L0,900Z" fill="#9AC0CD" fill-opacity="0.06"/>
  <!-- Shield/cross motif -->
  <rect x="250" y="200" width="100" height="120" rx="10" fill="none" stroke="#9AC0CD" stroke-width="2" stroke-opacity="0.12"/>
  <line x1="300" y1="215" x2="300" y2="305" stroke="#9AC0CD" stroke-width="2" stroke-opacity="0.12"/>
  <line x1="265" y1="260" x2="335" y2="260" stroke="#9AC0CD" stroke-width="2" stroke-opacity="0.12"/>
  <!-- Wing-like arcs -->
  <path d="M100,500 Q300,400 500,500" fill="none" stroke="#9AC0CD" stroke-width="1.5" stroke-opacity="0.1"/>
  <path d="M120,550 Q300,460 480,550" fill="none" stroke="#9AC0CD" stroke-width="1" stroke-opacity="0.08"/>
  <!-- Stone texture -->
  <circle cx="80" cy="140" r="3" fill="#2A3238" fill-opacity="0.2"/>
  <circle cx="520" cy="170" r="4" fill="#2A3238" fill-opacity="0.15"/>
  <circle cx="460" cy="780" r="3" fill="#2A3238" fill-opacity="0.2"/>
  <circle cx="140" cy="730" r="4" fill="#2A3238" fill-opacity="0.12"/>
  <circle cx="350" cy="380" r="2" fill="#9AC0CD" fill-opacity="0.08"/>
  <circle cx="180" cy="480" r="3" fill="#9AC0CD" fill-opacity="0.06"/>
</svg>
