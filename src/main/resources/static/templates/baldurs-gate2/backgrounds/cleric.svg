<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#DAA520" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#B8860B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A2215"/>
      <stop offset="50%" stop-color="#1E1810"/>
      <stop offset="100%" stop-color="#14100A"/>
    </linearGradient>
    <linearGradient id="stone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A3020" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#2A2215" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1A1408" stop-opacity="0.25"/>
    </linearGradient>
  </defs>
  <rect width="600" height="900" fill="url(#bg)"/>
  <rect width="600" height="900" fill="url(#stone)"/>
  <circle cx="300" cy="350" r="300" fill="url(#glow)"/>
  <!-- Divine light rays -->
  <path d="M0,0 Q300,80 600,0 L600,100 Q300,180 0,100Z" fill="#DAA520" fill-opacity="0.08"/>
  <path d="M0,800 Q300,720 600,800 L600,900 L0,900Z" fill="#DAA520" fill-opacity="0.06"/>
  <!-- Holy symbol shape -->
  <line x1="300" y1="200" x2="300" y2="600" stroke="#DAA520" stroke-width="2" stroke-opacity="0.12"/>
  <line x1="200" y1="400" x2="400" y2="400" stroke="#DAA520" stroke-width="2" stroke-opacity="0.12"/>
  <!-- Radiant arcs -->
  <path d="M200,600 Q300,500 400,600" fill="none" stroke="#DAA520" stroke-width="1.5" stroke-opacity="0.1"/>
  <path d="M150,650 Q300,530 450,650" fill="none" stroke="#DAA520" stroke-width="1" stroke-opacity="0.08"/>
  <!-- Stone texture -->
  <circle cx="100" cy="180" r="3" fill="#3A3020" fill-opacity="0.2"/>
  <circle cx="500" cy="140" r="4" fill="#3A3020" fill-opacity="0.15"/>
  <circle cx="460" cy="780" r="3" fill="#3A3020" fill-opacity="0.2"/>
  <circle cx="140" cy="720" r="4" fill="#3A3020" fill-opacity="0.12"/>
  <circle cx="250" cy="300" r="2" fill="#DAA520" fill-opacity="0.08"/>
  <circle cx="380" cy="550" r="3" fill="#DAA520" fill-opacity="0.06"/>
</svg>
