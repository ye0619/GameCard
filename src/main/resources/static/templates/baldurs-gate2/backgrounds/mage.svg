<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#4169E1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1E3A8A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="50%" stop-color="#12121E"/>
      <stop offset="100%" stop-color="#0A0A14"/>
    </linearGradient>
    <linearGradient id="stone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A2A4A" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#1A1A2E" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0A0A1E" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="600" height="900" fill="url(#bg)"/>
  <rect width="600" height="900" fill="url(#stone)"/>
  <circle cx="300" cy="350" r="300" fill="url(#glow)"/>
  <!-- Arcane runes pattern -->
  <path d="M0,0 Q300,80 600,0 L600,100 Q300,180 0,100Z" fill="#4169E1" fill-opacity="0.08"/>
  <path d="M0,800 Q300,720 600,800 L600,900 L0,900Z" fill="#4169E1" fill-opacity="0.06"/>
  <!-- Magic circle arcs -->
  <circle cx="300" cy="450" r="180" fill="none" stroke="#4169E1" stroke-width="1" stroke-opacity="0.1"/>
  <circle cx="300" cy="450" r="140" fill="none" stroke="#4169E1" stroke-width="1" stroke-opacity="0.08" stroke-dasharray="10,15"/>
  <!-- Star pattern -->
  <polygon points="300,180 310,220 350,225 320,250 330,290 300,270 270,290 280,250 250,225 290,220" fill="#4169E1" fill-opacity="0.08"/>
  <polygon points="300,620 310,660 350,665 320,690 330,730 300,710 270,730 280,690 250,665 290,660" fill="#4169E1" fill-opacity="0.06"/>
  <!-- Stone texture -->
  <circle cx="90" cy="160" r="3" fill="#2A2A4A" fill-opacity="0.2"/>
  <circle cx="510" cy="200" r="4" fill="#2A2A4A" fill-opacity="0.15"/>
  <circle cx="480" cy="700" r="3" fill="#2A2A4A" fill-opacity="0.2"/>
  <circle cx="120" cy="680" r="4" fill="#2A2A4A" fill-opacity="0.12"/>
</svg>
